<!-- 下拉選單預設顯示載入中 -->
<div class="form-group">
  <label for="item">報名項目／時段</label>
  <select id="item" required>
    <option value="">載入最新課程中...</option>
  </select>
</div>

<script>
  const LIFF_ID = "2010788391-bIBpQ7sB";
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxv8L1z4cr1Bg7VlqTpjBwR6qy6oaGTjB9N_RaV0LgsRflO1V5G91l3K36T3OxQQC_G/exec";
  let profileData = {};

  async function main() {
    try {
      // 1. 初始化 LIFF 取得使用者身分
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) {
        liff.login();
      } else {
        const profile = await liff.getProfile();
        profileData = { userId: profile.userId, displayName: profile.displayName };
        document.getElementById('lineName').innerText = profile.displayName;
        document.getElementById('submitBtn').disabled = false;
      }

      // 2. 向 GAS 讀取最新的課程選單
      loadCourses();

    } catch (err) {
      alert("LIFF 初始化失敗：" + err.message);
    }
  }

  // 自動載入試算表課程函式
  async function loadCourses() {
    try {
      const response = await fetch(GAS_URL);
      const result = await response.json();
      
      const selectEl = document.getElementById('item');
      selectEl.innerHTML = '<option value="">請選擇項目</option>'; // 清空選單

      if (result.status === "success" && result.courses.length > 0) {
        result.courses.forEach(course => {
          const option = document.createElement('option');
          option.value = course;
          option.innerText = course;
          selectEl.appendChild(option);
        });
      } else {
        selectEl.innerHTML = '<option value="">目前暫無開放預約的課程</option>';
      }
    } catch (err) {
      console.error("載入課程失敗：", err);
      document.getElementById('item').innerHTML = '<option value="">課程載入失敗，請重新整理</option>';
    }
  }

  main();
</script>
